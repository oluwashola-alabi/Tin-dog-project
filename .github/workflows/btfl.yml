name: BitFlow SDK Activity Engine (Reduced & Randomized)

on:
  schedule:
    - cron: '7 */4 * * *' # every 4 hours (6 runs/day)
  workflow_dispatch:

concurrency:
  group: bitflow-downloads
  cancel-in-progress: false

jobs:
  download-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        batch: [1, 2]

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm
        run: |
          npm config set cache /tmp/.npm --global
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set prefer-online true
          npm config set audit false
          npm config set fund false

      - name: Run randomized activity
        run: |
          PKG="@yusufolosun/bitflow-lend-sdk"
          set +e

          ROUNDS=$((RANDOM % 8 + 8)) # 8–15 rounds
          echo "Running $ROUNDS rounds"

          for round in $(seq 1 $ROUNDS); do
            echo "🔁 Round $round/$ROUNDS (Batch ${{ matrix.batch }})"

            sleep $((RANDOM % 6 + 2))

            WORKDIR=$(mktemp -d)
            cd "$WORKDIR"

            npm init -y > /dev/null 2>&1

            # 85% probability install
            if [ $((RANDOM % 100)) -lt 85 ]; then
              npm install "$PKG" \
                --prefer-online \
                --no-audit \
                --no-fund \
                --no-cache \
                > /dev/null 2>&1 || true
              echo "📦 Install executed"
            else
              echo "⏭ Install skipped"
            fi

            npm pack "$PKG" > /dev/null 2>&1 || true
            npm view "$PKG" version > /dev/null 2>&1 || true

            cd /
            rm -rf "$WORKDIR"
          done

          echo "✅ Batch ${{ matrix.batch }} complete"
